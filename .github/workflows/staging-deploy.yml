name: Deploy staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bandkit-staging-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Гейт ДО того, как VPS тронут вообще.
  #
  # `npm run check` и без этого job'а запускается — root-овым враппером на самой машине
  # (`/usr/local/sbin/bandkit-staging-deploy`, вне контроля версий), для фронта и для
  # сервера. Проблема не в том, что проверок нет, а в том, КОГДА они:
  #
  #   git pull → npm install → run-migrations.js → npm run check
  #                            ^^^^^^^^^^^^^^^^^   ^^^^^^^^^^^^^^
  #                            схема уже изменена  а проверки только здесь
  #
  # Миграции применяются раньше проверок и не откатываются. Коммит, не проходящий check,
  # успевает переписать схему staging-БД до того, как об этом кто-то узнает. Здесь же
  # красный check означает, что VPS не сделает даже `git pull`.
  #
  # Только server: у него нет зависимостей для сборки (stdlib + node --check + node --test),
  # поэтому job не требует npm ci и не может упасть по чужой причине. Фронтовый tsc сюда
  # не добавлен сознательно — его враппер уже гоняет, а зелёным сам по себе он здесь не
  # проверялся.
  check:
    name: Server checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm run check
        working-directory: server
        run: npm run check

  deploy:
    name: Deploy to VPS staging
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check required secrets
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$STAGING_HOST"
          test -n "$STAGING_USER"
          test -n "$STAGING_SSH_KEY"

      - name: Prepare SSH key
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_PORT: ${{ secrets.STAGING_PORT }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_KNOWN_HOSTS: ${{ secrets.STAGING_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" > ~/.ssh/bandkit_staging_key
          chmod 600 ~/.ssh/bandkit_staging_key
          PORT="${STAGING_PORT:-22}"
          if [ -n "${STAGING_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$STAGING_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$PORT" -H "$STAGING_HOST" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy and smoke on VPS
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_PORT: ${{ secrets.STAGING_PORT }}
        run: |
          set -euo pipefail
          PORT="${STAGING_PORT:-22}"
          ssh -i ~/.ssh/bandkit_staging_key \
            -p "$PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$STAGING_USER@$STAGING_HOST" \
            'set -euo pipefail
             sudo -n /usr/local/sbin/bandkit-staging-deploy
             cd /opt/Bandkitalpha
             git config --global --add safe.directory /opt/Bandkitalpha 2>/dev/null || true
             API_BASE="${API_BASE:-https://bandkitdev.mywire.org/api/v1}" /bin/bash scripts/staging-smoke-api.sh
             STATUS="$(git status --short)"
             if [ -n "$STATUS" ]; then
               printf "%s\n" "$STATUS"
               exit 1
             fi
             echo "[bandkit actions] Staging deploy and smoke completed"'
