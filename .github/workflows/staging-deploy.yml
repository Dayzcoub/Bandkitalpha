name: Deploy staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bandkit-staging-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Гейт ДО того, как VPS тронут вообще.
  #
  # `npm run check` и без этого job'а запускается — root-овым враппером на самой машине
  # (`/usr/local/sbin/bandkit-staging-deploy`, вне контроля версий), для фронта и для
  # сервера. Проблема не в том, что проверок нет, а в том, КОГДА они:
  #
  #   git pull → npm install → check(фронт) → build → run-migrations.js → check(сервер)
  #                                                   ^^^^^^^^^^^^^^^^^   ^^^^^^^^^^^^^
  #                                                   схема уже изменена  а это только тут
  #
  # Фронтовая проверка успевает до миграций, СЕРВЕРНАЯ — нет. То есть коммит, не
  # проходящий серверный check, успевает переписать схему staging-БД до того, как об этом
  # кто-то узнает, а миграции не откатываются. Здесь же красный check означает, что VPS не
  # сделает даже `git pull`.
  check:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm run check (server)
        working-directory: server
        run: npm run check

      # Фронтовая проверка добавлена 2026-07-16, после того как она поймала то, чего
      # серверная поймать не могла: `scripts/check-admin-contracts.mjs` — контракт
      # фронта, но проверяет он ФАЙЛЫ СЕРВЕРА. Рефактор роутера (F6) убрал реестр
      # admin-маршрутов из `server/src/index.js`, и красным стал фронтовый check.
      #
      # Первая редакция этого job'а брала только server, «чтобы не упасть по чужой
      # причине». Причина оказалась своей. Граница «фронт/сервер» проходит не там, где
      # лежат файлы.
      #
      # Здесь нужен npm ci: tsc — devDependency. Это медленнее server-job'а и это цена
      # того, чтобы VPS не делал `git pull` на коммит, который всё равно не соберётся.
      - name: npm ci (frontend)
        run: npm ci
      - name: npm run check (frontend)
        run: npm run check

  deploy:
    name: Deploy to VPS staging
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check required secrets
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$STAGING_HOST"
          test -n "$STAGING_USER"
          test -n "$STAGING_SSH_KEY"

      - name: Prepare SSH key
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_PORT: ${{ secrets.STAGING_PORT }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_KNOWN_HOSTS: ${{ secrets.STAGING_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" > ~/.ssh/bandkit_staging_key
          chmod 600 ~/.ssh/bandkit_staging_key
          PORT="${STAGING_PORT:-22}"
          if [ -n "${STAGING_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$STAGING_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$PORT" -H "$STAGING_HOST" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy and smoke on VPS
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_PORT: ${{ secrets.STAGING_PORT }}
        run: |
          set -euo pipefail
          PORT="${STAGING_PORT:-22}"
          ssh -i ~/.ssh/bandkit_staging_key \
            -p "$PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$STAGING_USER@$STAGING_HOST" \
            'set -euo pipefail
             sudo -n /usr/local/sbin/bandkit-staging-deploy
             cd /opt/Bandkitalpha
             git config --global --add safe.directory /opt/Bandkitalpha 2>/dev/null || true
             API_BASE="${API_BASE:-https://bandkitdev.mywire.org/api/v1}" /bin/bash scripts/staging-smoke-api.sh
             STATUS="$(git status --short)"
             if [ -n "$STATUS" ]; then
               printf "%s\n" "$STATUS"
               exit 1
             fi
             echo "[bandkit actions] Staging deploy and smoke completed"'
