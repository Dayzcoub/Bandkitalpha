name: Deploy BandKit preview to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bandkit-vps-preview
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy static preview
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
      SSH_KEY_PATH: /home/runner/.ssh/bandkit_deploy_key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Force public npm registry
        shell: bash
        run: |
          set -euo pipefail
          unset NPM_CONFIG_USERCONFIG
          unset NODE_AUTH_TOKEN
          rm -f "$HOME/.npmrc" .npmrc
          cat > .npmrc <<'NPMRC'
          registry=https://registry.npmjs.org/
          always-auth=false
          replace-registry-host=always
          NPMRC
          npm config --userconfig .npmrc get registry
          npm config --userconfig .npmrc get replace-registry-host

      - name: Normalize package lock registry URLs
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            python3 - <<'PY'
          from pathlib import Path
          path = Path('package-lock.json')
          text = path.read_text()
          replacements = {
              'https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/': 'https://registry.npmjs.org/',
              'https://packages.applied-caas-gateway.internal.api.openai.org/artifactory/api/npm/npm-public/': 'https://registry.npmjs.org/',
              'http://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/': 'https://registry.npmjs.org/',
              'http://packages.applied-caas-gateway.internal.api.openai.org/artifactory/api/npm/npm-public/': 'https://registry.npmjs.org/',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          path.write_text(text)
          PY
          fi
          if grep -R "applied-caas-gateway" package-lock.json package.json 2>/dev/null; then
            echo "Internal registry URLs remain in package files" >&2
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        env:
          NPM_CONFIG_USERCONFIG: .npmrc
          NODE_AUTH_TOKEN: ''
        run: npm ci --userconfig .npmrc --registry=https://registry.npmjs.org/ --replace-registry-host=always

      - name: Build static app
        run: npm run build

      - name: Validate local build output
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -d dist/js
          test -d dist/styles

      - name: Validate VPS secrets
        shell: bash
        run: |
          set -euo pipefail
          : "${VPS_HOST:?Missing VPS_HOST secret}"
          : "${VPS_USER:?Missing VPS_USER secret}"
          : "${{ secrets.VPS_SSH_KEY }}"

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > "$SSH_KEY_PATH"
          chmod 600 "$SSH_KEY_PATH"
          ssh-keyscan -p "$PORT" "$VPS_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Deploy dist to VPS
        shell: bash
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          DEPLOY_PATH="${VPS_DEPLOY_PATH:-/var/www/bandkit}"
          RELEASE_ID="${GITHUB_SHA::12}"
          REMOTE_RELEASE="$DEPLOY_PATH/releases/$RELEASE_ID"
          REMOTE_TMP="$DEPLOY_PATH/releases/.tmp-$RELEASE_ID"
          SSH_CMD="ssh -i $SSH_KEY_PATH -p $PORT -o IdentitiesOnly=yes"

          $SSH_CMD "$VPS_USER@$VPS_HOST" "set -euo pipefail; mkdir -p '$DEPLOY_PATH/releases'; rm -rf '$REMOTE_TMP'; mkdir -p '$REMOTE_TMP'"
          rsync -az --delete -e "$SSH_CMD" dist/ "$VPS_USER@$VPS_HOST:$REMOTE_TMP/"
          $SSH_CMD "$VPS_USER@$VPS_HOST" "set -euo pipefail
            test -f '$REMOTE_TMP/index.html'
            test -d '$REMOTE_TMP/js'
            test -d '$REMOTE_TMP/styles'
            rm -rf '$REMOTE_RELEASE'
            mv '$REMOTE_TMP' '$REMOTE_RELEASE'
            test -f '$REMOTE_RELEASE/index.html'
            ln -sfn '$REMOTE_RELEASE' '$DEPLOY_PATH/current'
            test -f '$DEPLOY_PATH/current/index.html'
            CURRENT_REAL=\$(readlink -f '$DEPLOY_PATH/current')
            find '$DEPLOY_PATH/releases' -maxdepth 1 -mindepth 1 -type d ! -path \"\$CURRENT_REAL\" -printf '%T@ %p\\n' | sort -rn | awk 'NR>5 {print substr(\$0, index(\$0, \$2))}' | xargs -r rm -rf
          "

      - name: Deployment summary
        run: |
          echo "BandKit preview deployed to VPS path: ${VPS_DEPLOY_PATH:-/var/www/bandkit}/current"